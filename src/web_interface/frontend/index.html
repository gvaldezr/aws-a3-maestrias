<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline Académico — Anáhuac Mérida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f5f2ef; color: #231F20; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.6rem 0.75rem; background: #231F20; color: white; font-weight: 600; font-size: 0.8rem; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e8e0d6; }
    tr:hover { background: #f9f6f2; }
    button { transition: opacity 0.15s; }
    button:hover:not(:disabled) { opacity: 0.85; }
    .status-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .status-pending_approval { background: #FFF0E0; color: #FF5900; }
    .status-approved { background: #E8F5E9; color: #2E7D32; }
    .status-content_ready { background: #E3F2FD; color: #1565C0; }
    .status-published { background: #E8F5E9; color: #2E7D32; }
    .status-rejected { background: #FFEBEE; color: #C62828; }
    .status-failed, .status-qa_failed { background: #FFEBEE; color: #C62828; }
    .status-knowledge_matrix_ready { background: #F3E5F5; color: #6A1B9A; }
    .status-di_ready { background: #E0F2F1; color: #00695C; }
    .status-uploaded { background: #ECEFF1; color: #546E7A; }
    .status-ingested { background: #ECEFF1; color: #546E7A; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
